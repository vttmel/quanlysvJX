name: quanlysvjx-manager

x-manager-project-root: &manager-project-root ${MANAGER_PROJECT_ROOT:-${PWD}}

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    working_dir: *manager-project-root
    command: sh -c "npm install && npm --workspace apps/api run dev"
    environment:
      COMPOSE_PROJECT_NAME: quanlysvjx
      MANAGER_API_HOST: 0.0.0.0
      MANAGER_API_PORT: 3001
      MANAGER_PROJECT_ROOT: *manager-project-root
    volumes:
      - type: bind
        source: *manager-project-root
        target: *manager-project-root
      - type: volume
        source: api-node-modules
        target: ${MANAGER_PROJECT_ROOT:-${PWD}}/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - manager-net
    restart: unless-stopped

  ui:
    image: node:22-alpine
    working_dir: *manager-project-root
    command: sh -c "npm install && npm --workspace apps/ui run dev -- --host 0.0.0.0"
    environment:
      VITE_HOST: 0.0.0.0
    volumes:
      - type: bind
        source: *manager-project-root
        target: *manager-project-root
      - type: volume
        source: ui-node-modules
        target: ${MANAGER_PROJECT_ROOT:-${PWD}}/node_modules
    networks:
      - manager-net
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "${MANAGER_HTTP_BIND:-0.0.0.0}:80:80"
    volumes:
      - ./apps/ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - ui
    networks:
      - manager-net
    restart: unless-stopped

networks:
  manager-net:
    driver: bridge

volumes:
  api-node-modules:
  ui-node-modules:
