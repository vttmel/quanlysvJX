services:
  jxmysql:
    image: mysql:5.6
    container_name: jxmysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234560123"
    command: --explicit_defaults_for_timestamp=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    mem_limit: 1g
    volumes:
      - ./database/mysql_server1/data:/var/lib/mysql
      - ./settings/docker.cnf:/etc/mysql/conf.d/docker.cnf:ro
    networks:
      - jxnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  jxmssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: unless-stopped
    container_name: jxmssql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "SAJx123456"
      ACCEPT_EULA: "Y"
      TZ: "Asia/Ho_Chi_Minh"
    volumes:
      - ./database/mssql/data:/var/opt/mssql/data
      - ./database/mssql/certs:/var/opt/mssql/certs:ro
      - ./database/mssql/mssql.conf:/var/opt/mssql/mssql.conf:ro
      - /etc/localtime:/etc/localtime:ro
    mem_limit: 1g
    networks:
      - jxnet
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  paysys:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.paysys
    image: paysys
    container_name: paysys
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:99
    volumes:
      - "./paysyswin:/src/paysys"
    network_mode: host
    depends_on:
      jxmysql:
        condition: service_healthy
      jxmssql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5002'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  s3relayserver:
    image: paysys
    container_name: s3relayserver
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:98
    volumes:
      - "./paysyswin:/src/paysys"
    network_mode: host
    depends_on:
      paysys:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/7777'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    command: [ "s3relay-entrypoint.sh" ]

  goddess:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/
        APP_CMD: goddess_y
    image: goddess
    container_name: goddess
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/goddess.cfg:/src/jxser/gateway/goddess.cfg"
    network_mode: host
    depends_on:
      s3relayserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5001'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  bishop:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/
        APP_CMD: bishop_y
    image: bishop
    container_name: bishop
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/bishop.cfg:/src/jxser/gateway/bishop.cfg"
    network_mode: host
    depends_on:
      goddess:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5622'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  s3relay:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/gateway/s3relay/
        APP_CMD: s3relay_y
    image: s3relay
    container_name: s3relay
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/relay_config.ini:/src/jxser/gateway/s3relay/relay_config.ini"
      - "./settings/gateway/hostset.ini:/src/jxser/gateway/s3relay/settings/hostset.ini"
      - ./logs/gateway/Logs:/src/jxser/gateway/Logs
      - ./logs/gateway/Backup:/src/jxser/gateway/Backup
      - ./logs/gateway/roleback:/src/jxser/gateway/roleback
      - ./logs/gateway/rolevalue_setting/rolevalue_log:/src/jxser/gateway/rolevalue_setting/rolevalue_log
      - ./logs/gateway/s3relay/Logs:/src/jxser/gateway/s3relay/Logs
      - ./logs/gateway/s3relay/relay_logs:/src/jxser/gateway/s3relay/relay_logs
      - ./logs/gateway/s3relay/RelayRunData:/src/jxser/gateway/s3relay/RelayRunData
    network_mode: host
    depends_on:
      bishop:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sleep 10; kill -0 1"]
      interval: 10s
      timeout: 12s
      retries: 12
      start_period: 5s

  jxserver:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
      args:
        APP_WORKDIR: /src/jxser/server1/
        APP_CMD: jx_linux_y
    image: jxserver
    container_name: jxserver
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/server1:/src/jxser/server1/"
      - "./settings/gs1/servercf0.ini:/src/jxser/server1/servercf0.ini"
      - ./logs/server1/Logs:/src/jxser/server1/Logs
      - ./logs/server1/itemexchange_setting/rolevalue_log:/src/jxser/server1/itemexchange_setting/rolevalue_log
      - "./script/camnangvozer.lua:/src/jxser/server1/script/global/mel/item/camnangvozer.lua"
      - "./script/configserver.lua:/src/jxser/server1/script/global/mel/configserver.lua"
      - "./settings/npcs.txt:/src/jxser/server1/settings/npcs.txt"
    network_mode: host
    depends_on:
      s3relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ip=$$(hostname -I | awk '{print $$1}'); bash -ec \"</dev/tcp/$${ip}/6666\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  jxnet:
    driver: bridge
