name: quanlysvjx-manager

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      COMPOSE_PROJECT_NAME: quanlysvjx
      MANAGER_API_HOST: 127.0.0.1
      MANAGER_API_PORT: 3001
      MANAGER_PROJECT_ROOT: ${MANAGER_PROJECT_ROOT:-${PWD}}
    volumes:
      - ./apps/jx-services:/workspace/apps/jx-services
      - ./.env:/workspace/.env
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    network_mode: host
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    depends_on:
      - api
    network_mode: host
    restart: unless-stopped
