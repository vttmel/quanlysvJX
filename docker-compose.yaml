services:
  goddess:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.goddess
    image: goddess
    container_name: goddess
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/goddess.cfg:/src/jxser/gateway/goddess.cfg"
    network_mode: host
  bishop:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.bishop
    image: bishop
    container_name: bishop
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/bishop.cfg:/src/jxser/gateway/bishop.cfg"
    network_mode: host
  s3relay:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.s3relay
    image: s3relay
    container_name: s3relay
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./settings/gateway/relay_config.ini:/src/jxser/gateway/s3relay/relay_config.ini"
      - "./settings/gateway/hostset.ini:/src/jxser/gateway/s3relay/settings/hostset.ini"
      - ./logs/gateway/Logs:/src/jxser/gateway/Logs
      - ./logs/gateway/Backup:/src/jxser/gateway/Backup
      - ./logs/gateway/roleback:/src/jxser/gateway/roleback
      - ./logs/gateway/rolevalue_setting/rolevalue_log:/src/jxser/gateway/rolevalue_setting/rolevalue_log
      - ./logs/gateway/s3relay/Logs:/src/jxser/gateway/s3relay/Logs
      - ./logs/gateway/s3relay/relay_logs:/src/jxser/gateway/s3relay/relay_logs
      - ./logs/gateway/s3relay/RelayRunData:/src/jxser/gateway/s3relay/RelayRunData
    network_mode: host
  jx_linux:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx_linux
    image: jx_linux
    container_name: jx_linux
    restart: no
    tty: true
    volumes:
      - "${SERVER_PATH}/server1:/src/jxser/server1/"
      - "./settings/gs1/servercf0.ini:/src/jxser/server1/servercf0.ini"
      - ./logs/server1/Logs:/src/jxser/server1/Logs
      - ./logs/server1/itemexchange_setting/rolevalue_log:/src/jxser/server1/itemexchange_setting/rolevalue_log
      - "./script/camnangvozer.lua:/src/jxser/server1/script/global/mel/item/camnangvozer.lua"
      - "./script/configserver.lua:/src/jxser/server1/script/global/mel/configserver.lua"
      - "./settings/npcs.txt:/src/jxser/server1/settings/npcs.txt"
    network_mode: host

  paysys:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.paysys
    image: paysys
    container_name: paysys
    restart: no
    tty: true
    volumes:
      - "./paysyswin:/src/paysys"
    network_mode: host
