name: quanlysvjx-manager

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      COMPOSE_PROJECT_NAME: quanlysvjx
      MANAGER_API_HOST: 0.0.0.0
      MANAGER_API_PORT: 3001
      MANAGER_PROJECT_ROOT: ${MANAGER_PROJECT_ROOT:-${PWD}}
      BACKUP_SCHEDULER_ENABLED: true
    volumes:
      - ./apps/jx-services:/workspace/apps/jx-services
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    network_mode: host
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - ui
networks:
  ui:
    driver: bridge
