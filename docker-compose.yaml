name: quanlysvjx-manager

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      COMPOSE_PROJECT_NAME: quanlysvjx
      MANAGER_API_HOST: 0.0.0.0
      MANAGER_API_PORT: 3001
      MANAGER_PROJECT_ROOT: ${MANAGER_PROJECT_ROOT:-${PWD}}
      BACKUP_SCHEDULER_ENABLED: true
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    privileged: true
    restart: unless-stopped
    network_mode: host

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${MANAGER_PROJECT_ROOT:-${PWD}}/apps/jx-services/versions:/srv/versions
      - filebrowser_data:/database
    environment:
      - FB_PORT=8080
      - FB_BASEURL=/filebrowser
      - FB_NOAUTH=true
      - TZ=Asia/Ho_Chi_Minh

volumes:
  filebrowser_data:
