services:
  jxmysql:
    image: mysql:5.6
    container_name: jxmysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${JX_MYSQL_ROOT_PASSWORD:-1234560123}
    command: --explicit_defaults_for_timestamp=1 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    mem_limit: 1g
    volumes:
      - jxmysql_data:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    networks:
      - jxnet
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  jxmssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: unless-stopped
    container_name: jxmssql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: ${JX_MSSQL_SA_PASSWORD:-SAJx123456}
      ACCEPT_EULA: "Y"
      TZ: "Asia/Ho_Chi_Minh"
    volumes:
      - jxmssql_data:/var/opt/mssql/data
      - ./mount/database/mssql/seed:/var/opt/mssql/seed:ro
      - ./mount/database/mssql/certs:/var/opt/mssql/certs:ro
      - ./mount/database/mssql/mssql.conf:/var/opt/mssql/mssql.conf:ro
      - /etc/localtime:/etc/localtime:ro
    mem_limit: 1g
    networks:
      - jxnet
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/1433'" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: jxmssql-init
    restart: "no"
    environment:
      SA_PASSWORD: ${JX_MSSQL_SA_PASSWORD:-SAJx123456}
      MSSQL_ACCOUNT_DATABASE: ${JX_MSSQL_ACCOUNT_DATABASE:-account_tong}
    volumes:
      - ./mount/database/mssql/seed:/var/opt/mssql/seed:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - jxnet
    depends_on:
      jxmssql:
        condition: service_healthy
    command: [ "/bin/bash", "/var/opt/mssql/seed/init-account-tong.sh" ]

  paysys:
    build:
      context: .
      dockerfile: ./dockerfiles/Dockerfile.paysys
    image: paysys
    container_name: paysys
    user: "0:0"
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:99
      - JX_MSSQL_IP_ENCRYPTED=${JX_MSSQL_IP_ENCRYPTED}
      - JX_MSSQL_DB_ENCRYPTED=${JX_MSSQL_DB_ENCRYPTED}
      - JX_MSSQL_USER_ENCRYPTED=${JX_MSSQL_USER_ENCRYPTED}
      - JX_MSSQL_PASS_ENCRYPTED=${JX_MSSQL_PASS_ENCRYPTED}
    volumes:
      - "./mount/paysyswin:/src/paysys"
      - "./mount/config/paysys/database.ini:/src/paysys/database.ini"
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    depends_on:
      jxmysql:
        condition: service_healthy
      mssql-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5002'" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  s3relayserver:
    image: paysys
    container_name: s3relayserver
    user: "0:0"
    restart: no
    tty: true
    ipc: host
    environment:
      - DISPLAY=:98
      - JX_MSSQL_IP_ENCRYPTED=${JX_MSSQL_IP_ENCRYPTED}
      - JX_MSSQL_DB_ENCRYPTED=${JX_MSSQL_DB_ENCRYPTED}
      - JX_MSSQL_USER_ENCRYPTED=${JX_MSSQL_USER_ENCRYPTED}
      - JX_MSSQL_PASS_ENCRYPTED=${JX_MSSQL_PASS_ENCRYPTED}
    volumes:
      - "./mount/paysyswin:/src/paysys"
      - "./mount/config/paysys/database.ini:/src/paysys/database.ini"
      - /etc/localtime:/etc/localtime:ro
    network_mode: host
    depends_on:
      paysys:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/7777'" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    command: [ "s3relay-entrypoint.sh" ]

  goddess:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
    image: jx-centos
    container_name: goddess
    working_dir: /src/jxser/gateway/
    restart: no
    tty: true
    environment:
      - JX_IP=${JX_IP:-auto}
      - JX_MYSQL_IP=${JX_MYSQL_IP}
      - APP_CMD=goddess_y
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./mount/config/gateway/goddess.cfg:/src/jxser/gateway/goddess.cfg"
      - "./dockerfiles/entrypoint.sh:/src/entrypoint.sh"
      - /etc/localtime:/etc/localtime:ro
    entrypoint: [ "/bin/bash", "/src/entrypoint.sh" ]
    network_mode: host
    depends_on:
      s3relayserver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5001'" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  bishop:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
    image: jx-centos
    container_name: bishop
    working_dir: /src/jxser/gateway/
    restart: no
    tty: true
    environment:
      - JX_IP=${JX_IP:-auto}
      - JX_PAYSYS_IP=${JX_PAYSYS_IP}
      - APP_CMD=bishop_y
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./mount/config/gateway/bishop.cfg:/src/jxser/gateway/bishop.cfg"
      - "./dockerfiles/entrypoint.sh:/src/entrypoint.sh"
      - /etc/localtime:/etc/localtime:ro
    entrypoint: [ "/bin/bash", "/src/entrypoint.sh" ]
    network_mode: host
    depends_on:
      goddess:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/5622'" ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  s3relay:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
    image: jx-centos
    container_name: s3relay
    working_dir: /src/jxser/gateway/s3relay/
    restart: no
    tty: true
    environment:
      - JX_IP=${JX_IP:-auto}
      - JX_MYSQL_IP=${JX_MYSQL_IP}
      - APP_CMD=s3relay_y
    volumes:
      - "${SERVER_PATH}/gateway:/src/jxser/gateway/"
      - "./mount/config/gateway/relay_config.ini:/src/jxser/gateway/s3relay/relay_config.ini"
      - "./mount/config/gateway/hostset.ini:/src/jxser/gateway/s3relay/settings/hostset.ini"
      - "./dockerfiles/entrypoint.sh:/src/entrypoint.sh"
      - ./mount/logs/gateway/Logs:/src/jxser/gateway/Logs
      - ./mount/logs/gateway/Backup:/src/jxser/gateway/Backup
      - ./mount/logs/gateway/roleback:/src/jxser/gateway/roleback
      - ./mount/logs/gateway/rolevalue_setting/rolevalue_log:/src/jxser/gateway/rolevalue_setting/rolevalue_log
      - ./mount/logs/gateway/s3relay/Logs:/src/jxser/gateway/s3relay/Logs
      - ./mount/logs/gateway/s3relay/relay_logs:/src/jxser/gateway/s3relay/relay_logs
      - ./mount/logs/gateway/s3relay/RelayRunData:/src/jxser/gateway/s3relay/RelayRunData
      - /etc/localtime:/etc/localtime:ro
    entrypoint: [ "/bin/bash", "/src/entrypoint.sh" ]
    network_mode: host
    depends_on:
      bishop:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "sleep 10; kill -0 1" ]
      interval: 10s
      timeout: 12s
      retries: 12
      start_period: 5s

  jxserver:
    build:
      context: ./dockerfiles
      dockerfile: Dockerfile.jx-centos
    image: jx-centos
    container_name: jxserver
    working_dir: /src/jxser/server1/
    restart: no
    tty: true
    environment:
      - JX_IP=${JX_IP:-auto}
      - APP_CMD=jx_linux_y
    volumes:
      - "${SERVER_PATH}/server1:/src/jxser/server1/"
      - "./mount/config/gs1/servercf0.ini:/src/jxser/server1/servercf0.ini"
      - "./dockerfiles/entrypoint.sh:/src/entrypoint.sh"
      - ./mount/logs/server1/Logs:/src/jxser/server1/Logs
      - ./mount/logs/server1/itemexchange_setting/rolevalue_log:/src/jxser/server1/itemexchange_setting/rolevalue_log
      - /etc/localtime:/etc/localtime:ro
    entrypoint: [ "/bin/bash", "/src/entrypoint.sh" ]
    network_mode: host
    depends_on:
      s3relay:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ip=$$(hostname -I | awk '{print $$1}'); bash -ec \"</dev/tcp/$${ip}/6666\"" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

networks:
  jxnet:
    driver: bridge

volumes:
  jxmysql_data:
  jxmssql_data:
